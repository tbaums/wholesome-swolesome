<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Swolesome">
  <meta name="theme-color" content="#0f0d1f">
  <title>Wholesome Swolesome</title>
  <link rel="manifest" href="manifest.json">
  <link data-trunk rel="rust" data-wasm-opt="z"/>
  <link data-trunk rel="copy-dir" href="public"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0d1f;   /* deep purple-black */
      --surface:  #1c1535;   /* dark purple */
      --surface2: #2d2050;   /* medium purple */
      --accent:   #5BCEFA;   /* trans blue */
      --pink:     #F5A9B8;   /* trans pink */
      --purple:   #A855F7;   /* vibrant purple */
      --success:  #F5A9B8;
      --danger:   #ef4444;
      --text:     #f0ecff;   /* lavender white */
      --text-muted: #a594cc; /* muted purple */
      --border:   #3d2878;   /* purple border */
      --radius:   10px;
      --nav-h:    56px;
      --trans:    linear-gradient(135deg, #5BCEFA 0%, #A855F7 50%, #F5A9B8 100%);
      --trans-h:  linear-gradient(90deg,  #5BCEFA 0%, #A855F7 50%, #F5A9B8 100%);
    }

    html, body {
      overscroll-behavior: none;
      background: var(--pink);  /* trans pink shows outside the app column */
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);   /* dark purple inside the column */
    }

    /* ── Animations ── */
    @keyframes popIn {
      0%   { transform: scale(0.7); }
      55%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Layout ── */
    .page {
      padding: 12px 12px calc(var(--nav-h) + 16px);
      -webkit-overflow-scrolling: touch;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .page-title {
      font-size: 20px;
      font-weight: 800;
      background: var(--trans);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: var(--nav-h);
      /* gradient top border */
      background: linear-gradient(var(--surface), var(--surface)) padding-box,
                  var(--trans-h) border-box;
      border-top: 2px solid transparent;
      display: flex;
      align-items: stretch;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-btn {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn .icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-btn.active {
      color: var(--accent);
    }

    /* Glowing pill behind active nav icon */
    .nav-btn.active::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 32px;
      background: linear-gradient(135deg,
        rgba(91,206,250,0.18) 0%,
        rgba(168,85,247,0.18) 50%,
        rgba(245,169,184,0.18) 100%);
      border-radius: 10px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }

    /* Bold trans gradient stripe on left edge */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 5px;
      background: var(--trans);
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 3px;
      background: var(--trans);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.1s, transform 0.1s;
    }

    .btn:active { transform: scale(0.96); opacity: 0.82; }

    .btn-primary   { background: var(--accent);  color: #0f0d1f; }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-danger    { background: var(--danger);  color: #fff; }
    .btn-success   { background: var(--success); color: #0f0d1f; }
    .btn-ghost     { background: transparent; color: var(--text-muted); padding: 8px 12px; }
    .btn-full      { width: 100%; margin-top: 8px; }
    .btn-sm        { padding: 8px 14px; font-size: 13px; }

    .btn-finish {
      background: var(--trans);
      color: #0f0d1f;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
      padding: 13px 16px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(168,85,247,0.35);
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      font-size: 20px;
    }

    /* ── Inputs ── */
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(91,206,250,0.2);
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group { margin-bottom: 14px; }

    /* ── Exercise card (session view) ── */
    .ex-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      transition: border-color 0.25s;
    }

    .ex-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 5px;
      background: var(--trans);
    }

    .ex-card.ex-complete {
      border-color: var(--pink);
      background: linear-gradient(135deg, #1c1535 0%, #2a1040 100%);
    }

    .exercise-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      padding: 2px 0;
    }

    .card-title,
    .exercise-header .card-title {
      background: var(--trans);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .exercise-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .exercise-chevron {
      font-size: 22px;
      color: var(--purple);
      transition: transform 0.25s ease;
      display: inline-block;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      /* Larger tap target */
      padding: 4px 6px;
    }

    .exercise-chevron.open { transform: rotate(180deg); }

    /* Accordion body — CSS grid trick */
    .exercise-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease;
      overflow: hidden;
    }

    .exercise-body.open { grid-template-rows: 1fr; }
    .exercise-body > div { overflow: hidden; }

    .exercise-sets { margin-top: 10px; }

    /* ── Exercise complete badge ── */
    .exercise-complete-badge {
      font-size: 11px;
      background: var(--pink);
      color: #0f0d1f;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      animation: popIn 0.25s ease-out;
    }

    /* ── Set rows ── */
    .set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      transition: opacity 0.2s;
    }

    .set-row.set-done { opacity: 0.45; }

    .set-num {
      font-size: 12px;
      color: var(--purple);
      font-weight: 700;
      width: 36px;
      flex-shrink: 0;
    }

    .set-inputs {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .set-num-input {
      width: 64px !important;
      padding: 7px 4px !important;
      font-size: 14px !important;
      font-weight: 700;
      text-align: center;
      -moz-appearance: textfield;
    }
    .set-num-input::-webkit-inner-spin-button,
    .set-num-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .set-x {
      color: var(--purple);
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .set-done-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 17px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .set-done-btn:active { transform: scale(0.88); }

    .set-done-btn.done {
      background: var(--pink);
      border-color: var(--pink);
      color: #0f0d1f;
      animation: popIn 0.25s ease-out;
    }

    .add-set-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px dashed var(--purple);
      border-radius: 8px;
      color: var(--purple);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }

    .add-set-btn:active {
      background: rgba(168,85,247,0.15);
    }

    /* ── Category pills ── */
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .pill-main    { background: rgba(91,206,250,0.15);  color: #5BCEFA; }
    .pill-core    { background: rgba(168,85,247,0.15);  color: #A855F7; }
    .pill-cardio  { background: rgba(245,169,184,0.15); color: #F5A9B8; }

    /* ── History ── */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .history-date  { font-size: 13px; color: var(--text-muted); }
    .history-stats { font-size: 13px; color: var(--text-muted); text-align: right; }

    /* ── Plan editor ── */
    .day-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .ex-edit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }

    .ex-edit-info { flex: 1; }

    /* ── Back button ── */
    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      padding: 4px 8px 4px 0;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 20px;
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Progress table ── */
    .progress-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .progress-table th {
      text-align: left;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .progress-table td { padding: 10px 0; border-bottom: 1px solid var(--border); }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      display: flex;
      align-items: flex-end;
    }

    .modal-sheet {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      border-top: 2px solid transparent;
      background: linear-gradient(var(--surface), var(--surface)) padding-box,
                  var(--trans-h) border-box;
      padding: 24px 16px calc(env(safe-area-inset-bottom) + 16px);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
      background: var(--trans);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 16px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--purple);
      color: var(--text);
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      z-index: 300;
      pointer-events: none;
      animation: slideUp 0.2s ease-out;
      box-shadow: 0 4px 20px rgba(168,85,247,0.3);
    }

    /* ── Utilities ── */
    .row       { display: flex; gap: 8px; }
    .col       { display: flex; flex-direction: column; gap: 8px; }
    .flex-1    { flex: 1; }
    .mt-8      { margin-top: 8px; }
    .mt-16     { margin-top: 16px; }
    .text-muted   { color: var(--text-muted); }
    .text-sm      { font-size: 13px; }
    .text-accent  { color: var(--accent); }
    .text-success { color: var(--success); }
    .fw-600    { font-weight: 600; }
  </style>
</head>
<body>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
